# Process Control Limits
# Autonomous and ML-enhanced rules for KS-4

process_control_limits:
  description: "Autonomous process control with ML predictions and self-updating rules"

  metadata:
    version: "3.0.0"
    last_updated: "2026-03-08"
    source: "continuous_learning"
    confidence: dynamic  # Updates based on performance
    learning_rate: 0.01
    update_frequency: "daily"
    autonomous_updates: true
    human_approval_required: false  # For confidence > 0.95

  ml_enhancements:
    prediction_models:
      removal_rate_predictor:
        type: "neural_network"
        inputs: ["pad_life", "conditioning_freq", "ambient_temp", "slurry_age"]
        accuracy: 0.97
        prediction_horizon: "4_hours"
        confidence_threshold: 0.85

    anomaly_detection:
      removal_rate_anomaly:
        type: "isolation_forest"
        contamination: 0.01
        sensitivity: "high"
        auto_adjust: true

    optimization_engine:
      parameter_optimizer:
        type: "bayesian_optimization"
        objective: "maximize_removal_rate_uniformity"
        constraints: ["safety_limits", "quality_targets"]
        exploration_rate: 0.1

  autonomous_adjustments:
    self_updating_rules:
      learning_trigger:
        condition: "performance_degradation > 5%"
        data_required: 100_points
        approval_required: false  # Auto-approve if confidence > 0.95

    collaborative_learning:
      multi_agent_sharing:
        enabled: true
        sharing_frequency: "weekly"
        anonymized: true
        consensus_required: 0.8

    human_in_the_loop:
      intervention_triggers:
        - confidence < 0.8
        - safety_violation
        - novel_situation
        - conflicting_recommendations

  multi_agent_coordination:
    agent_roles:
      - diagnostic_agent
      - predictive_agent
      - optimization_agent
      - safety_agent

    coordination_protocol:
      consensus_mechanism: "weighted_voting"
      conflict_resolution: "senior_agent_override"
      performance_sharing: true
      learning_synchronization: true

  oxide_polish:
    removal_rate:
      base_value: 600
      tolerance: ±50
      unit: nm/min

      # ML predicted value (updates continuously)
      predicted_value: 595
      prediction_confidence: 0.93
      prediction_horizon: "next_4_hours"

      # Autonomous adjustments
      self_optimization:
        enabled: true
        optimization_target: "maximize_uniformity"
        constraints: ["safety_limits", "quality_targets"]
        exploration_rate: 0.05

      # Multi-agent consensus
      consensus_value: 597
      consensus_confidence: 0.96
      participating_agents: 4
      consensus_reached: true

      # Anomaly detection
      anomaly_score: 0.02  # 0-1, higher = more anomalous
      is_anomaly: false
      anomaly_explanation: "Within normal operating parameters"

      # Collaborative learning
      peer_consensus:
        fab_a: 595
        fab_b: 598
        fab_c: 597
        consensus: 596.7
        std_dev: 1.5

  validation:
    method: "ml_ensemble"
    confidence_threshold: 0.85
    auto_approval: true
    human_review: "conditional"

  autonomous_features:
    self_validation: true
    peer_validation: true
    continuous_learning: true
    predictive_maintenance: true
    collaborative_optimization: true

  system_health:
    ontology_health: 0.98
    ml_model_health: 0.97
    multi_agent_sync: 0.99
    last_self_check: "2026-03-08T12:00:00Z"
    next_update: "2026-03-09T00:00:00Z"

export:
  turtle: "../export/autonomous-rules.ttl"
  ml_model: "../export/removal-rate-predictor.pkl"
  consensus_log: "../export/consensus-log.json"

