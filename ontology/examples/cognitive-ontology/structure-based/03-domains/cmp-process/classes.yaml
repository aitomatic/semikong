# CMP Process Classes
# Domain-specific classes for CMP

classes:
  - id: "CMPProcess"
    type: "owl:Class"
    label: "CMP Process"
    definition: "Chemical Mechanical Planarization process"
    namespace: "semicont-cmp"
    iri: "https://semicont.org/ontology/cmp#CMPProcess"
    subclass_of: "semicont-core:Process"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    attributes:
      - name: "removalRate"
        type: "xsd:double"
        unit: "nm/min"
      - name: "uniformity"
        type: "xsd:double"
        unit: "%"
      - name: "selectivity"
        type: "xsd:double"
        description: "Ratio of removal rates"

  - id: "PolishingStep"
    type: "owl:Class"
    label: "Polishing Step"
    definition: "Individual polishing operation within CMP"
    namespace: "semicont-cmp"
    iri: "https://semicont.org/ontology/cmp#PolishingStep"
    subclass_of: "semicont-core:ProcessStep"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    attributes:
      - name: "pressure"
        type: "xsd:double"
        unit: "psi"
      - name: "velocity"
        type: "xsd:double"
        unit: "rpm"
      - name: "duration"
        type: "xsd:double"
        unit: "seconds"

  - id: "Slurry"
    type: "owl:Class"
    label: "Slurry"
    definition: "Chemical mechanical polishing fluid"
    namespace: "semicont-cmp"
    iri: "https://semicont.org/ontology/cmp#Slurry"
    subclass_of: "semicont-core:Material"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    attributes:
      - name: "pH"
        type: "xsd:double"
      - name: "abrasiveConcentration"
        type: "xsd:double"
        unit: "%"
      - name: "oxidizerConcentration"
        type: "xsd:double"
        unit: "%"

  - id: "Pad"
    type: "owl:Class"
    label: "Pad"
    definition: "Polishing pad used in CMP"
    namespace: "semicont-cmp"
    iri: "https://semicont.org/ontology/cmp#Pad"
    subclass_of: "semicont-core:Equipment"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    attributes:
      - name: "hardness"
        type: "xsd:double"
        unit: "Shore D"
      - name: "porosity"
        type: "xsd:double"
        unit: "%"
      - name: "thickness"
        type: "xsd:double"
        unit: "mm"

  - id: "Conditioner"
    type: "owl:Class"
    label: "Conditioner"
    definition: "Pad conditioning tool"
    namespace: "semicont-cmp"
    iri: "https://semicont.org/ontology/cmp#Conditioner"
    subclass_of: "semicont-core:Equipment"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    attributes:
      - name: "diamondSize"
        type: "xsd:integer"
        unit: "mesh"
      - name: "conditioningRate"
        type: "xsd:double"
        unit: "μm/min"
      - name: "force"
        type: "xsd:double"
        unit: "N"