# Core classes
# Fundamental abstractions in semiconductor manufacturing

classes:
  - id: "Material"
    type: "owl:Class"
    label: "Material"
    definition: "Physical substance used in semiconductor manufacturing"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#Material"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    relationships:
      - type: "subclass-of"
        target: "owl:Thing"
      - type: "related-to"
        target: "Process"
        via: "used-in"

  - id: "Process"
    type: "owl:Class"
    label: "Process"
    definition: "Manufacturing operation that transforms inputs to outputs"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#Process"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    relationships:
      - type: "subclass-of"
        target: "owl:Thing"
      - type: "related-to"
        target: "Material"
        via: "uses"
      - type: "related-to"
        target: "Equipment"
        via: "performed-by"

  - id: "Equipment"
    type: "owl:Class"
    label: "Equipment"
    definition: "Tool or machine used in semiconductor manufacturing"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#Equipment"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    relationships:
      - type: "subclass-of"
        target: "owl:Thing"
      - type: "related-to"
        target: "Process"
        via: "performs"

  - id: "Product"
    type: "owl:Class"
    label: "Product"
    definition: "Intermediate or final output of manufacturing"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#Product"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    relationships:
      - type: "subclass-of"
        target: "owl:Thing"
      - type: "related-to"
        target: "Process"
        via: "result-of"

  - id: "Measurement"
    type: "owl:Class"
    label: "Measurement"
    definition: "Quantitative observation of a property"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#Measurement"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    relationships:
      - type: "subclass-of"
        target: "owl:Thing"
      - type: "related-to"
        target: "owl:Thing"
        via: "measures"

  - id: "Wafer"
    type: "owl:Class"
    label: "Wafer"
    definition: "Silicon substrate for semiconductor devices"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#Wafer"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    relationships:
      - type: "subclass-of"
        target: "Product"
      - type: "related-to"
        target: "Process"
        via: "undergoes"

  - id: "WaferLot"
    type: "owl:Class"
    label: "Wafer Lot"
    definition: "Collection of wafers processed together"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#WaferLot"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    relationships:
      - type: "subclass-of"
        target: "Product"
      - type: "related-to"
        target: "Wafer"
        via: "contains"

  - id: "ProcessStep"
    type: "owl:Class"
    label: "Process Step"
    definition: "Individual operation within a manufacturing process"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#ProcessStep"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"
    relationships:
      - type: "subclass-of"
        target: "Process"
      - type: "related-to"
        target: "Process"
        via: "part-of"