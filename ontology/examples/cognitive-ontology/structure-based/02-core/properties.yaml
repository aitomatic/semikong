# Core properties
# Relationships between classes

properties:
  # Object Properties
  - id: "uses"
    type: "owl:ObjectProperty"
    label: "uses"
    definition: "Process consumes material as input"
    namespace: "semicont-core"
    iri: "https://semicont.org/ontology/core#uses"
    domain: "Process"
    range: "Material"
    cardinality: "0..*"
    inverse: "used-in"
    metadata:
      version: "0.1.0"
      status: "stable"
      source: "synthetic"
      model: "kimi-k2-0905-preview"

  - id: "used-in"
    type: "owl:ObjectProperty"
    label: "used in"
    definition: "Material is consumed by process"
