name: Branch Flow

on:
  pull_request:
    branches:
      - main
      - stable

jobs:
  validate-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Validate allowed promotion path
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          case "${BASE_REF}:${HEAD_REF}" in
            main:develop|stable:main)
              echo "Allowed branch flow: ${HEAD_REF} -> ${BASE_REF}"
              ;;
            *)
              echo "Invalid branch flow: ${HEAD_REF} -> ${BASE_REF}"
              echo "Only develop -> main and main -> stable are allowed."
              exit 1
              ;;
          esac
